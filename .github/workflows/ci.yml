name: CI

on:
    push:
        branches: [ main ]
    pull_request:

concurrency:
  group: production-deploy
  cancel-in-progress: true


jobs:
    build-test-push:
        runs-on: ubuntu-latest

        services:
            postgres:
                image: postgres:16
                env:
                    POSTGRES_USER: postgres
                    POSTGRES_PASSWORD: postgres
                    POSTGRES_DB: test_db
                ports:
                    - 5433:5432
                options: >-
                    --health-cmd="pg_isready -U postgres"
                    --health-interval=10s
                    --health-timeout=5s
                    --health-retries=5

        steps:
            - name: Checkout repo
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                python-version: "3.10"
            
            - name: Create .env file from example
              run: cp .env.example .env
            
            - name: Install dependencies
              run: pip install -r server/requirements.txt

            - name: Run tests
              run: pytest

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Extract metadata
              id: meta
              run: |
                echo "REPO_NAME=${GITHUB_REPOSITORY##*/}" >> "$GITHUB_OUTPUT"
                echo "SHORT_SHA=${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

            - name: Login to Docker Hub
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              uses: docker/login-action@v3
              with:
                username: ${{ secrets.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_PAT }}
            
            - name: Build and push backend image
              if: github.event_name == 'push'
              uses: docker/build-push-action@v6
              with:
                context: ./server
                file: ./server/Dockerfile
                push: true
                tags: |
                  ${{ secrets.DOCKERHUB_USERNAME }}/job-tracker-backend:latest
                  ${{ secrets.DOCKERHUB_USERNAME }}/job-tracker-backend:${{ github.sha }}

            - name: Build and push frontend image
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              uses: docker/build-push-action@v6
              with:
                context: ./web
                file: ./web/Dockerfile
                push: true
                tags: |
                  ${{ secrets.DOCKERHUB_USERNAME }}/job-tracker-frontend:latest
                  ${{ secrets.DOCKERHUB_USERNAME }}/job-tracker-frontend:${{ github.sha }}
            
            - name: Deploy to DigitalOcean Droplet
              if: github.event_name == 'push' && github.ref == 'refs/heads/main'
              uses: appleboy/ssh-action@v1.0.3
              with:
                host: ${{ secrets.DROPLET_IP }}
                username: ${{ secrets.DROPLET_USER }}
                key: ${{ secrets.DROPLET_SSH_KEY }}
                script: |
                  cd /home/${{ secrets.DROPLET_USER }}/app
                  docker-compose -f docker-compose.prod.yml pull
                  docker-compose -f docker-compose.prod.yml up -d --remove-orphans

