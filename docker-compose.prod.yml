services:
  db:
    image: postgres:16
    container_name: jobtracker_db
    restart: always
    environment:
      POSTGRES_USER: ${DATABASE_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - react-backend-net

  backend:
    image: archie955/job-tracker-backend:latest
    container_name: jobtracker_backend
    restart: always
    depends_on:
      - db
    env_file:
      - .env
    environment:
      DATABASE_HOSTNAME: db
      DATABASE_USERNAME: ${DATABASE_USERNAME}
      DATABASE_PASSWORD: ${DATABASE_PASSWORD}
      DATABASE_NAME: ${DATABASE_NAME}
    ports:
      - "8000:8000"
    networks:
      - react-backend-net

  frontend:
    image: archie955/job-tracker-frontend:latest
    container_name: jobtracker_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "80:80"
    networks:
      - react-backend-net

networks:
  react-backend-net:
    driver: bridge

volumes:
  postgres_data: